global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bell-casting-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bell-backend'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:9090']
    honor_labels: true

  - job_name: 'clickhouse'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['clickhouse:9363']

  - job_name: 'mosquitto'
    scrape_interval: 30s
    static_configs:
      - targets: ['mosquitto:9001']
